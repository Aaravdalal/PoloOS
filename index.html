<!DOCTYPE html>

<html>
  <head>
    <style>
      :root {
        --accent: #2e8b57;
      }

      body {
        margin: 0;
        overflow: hidden;
        font-family: FreeMono, monospace;
        background-image: url(./kermitwallpaper.png);
        background-size: cover;
        background-position: center;
        height: 100vh;
        transition: background-image 0.4s ease, background-color 0.4s ease;
      }

      #settingsPanel {
        position: fixed;
        top: 72px;
        right: 18px;
        width: min(320px, calc(100vw - 36px));
        padding: 18px;
        border-radius: 20px;
        background: linear-gradient(180deg, rgba(24, 24, 27, 0.72), rgba(24, 24, 27, 0.55));
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(24px) saturate(160%);
        color: #ffffff;
        display: none;
        z-index: 1002;
      }

      #widgetsPanel {
        position: fixed;
        top: 72px;
        right: 18px;
        width: 280px;
        display: none;
        flex-direction: column;
        gap: 12px;
        z-index: 1001;
      }

      .widget-card {
        padding: 14px;
        background: linear-gradient(180deg, rgba(24, 24, 27, 0.64), rgba(24, 24, 27, 0.42));
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 18px;
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.26);
        backdrop-filter: blur(20px) saturate(150%);
        color: #ffffff;
      }

      #clockWidget {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      #clockDisplay {
        font-size: 34px;
        font-weight: 700;
        letter-spacing: -0.04em;
      }

      #dateDisplay {
        font-size: 12px;
        opacity: 0.7;
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }

      #calendarWidget {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      #calendarHeader {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      #calendarGrid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 6px;
        font-size: 11px;
      }

      .calendar-day,
      .calendar-weekday {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 26px;
      }

      .calendar-weekday {
        opacity: 0.45;
      }

      .calendar-day.today {
        background: var(--accent);
        border-radius: 8px;
      }

      #quoteWidget {
        font-size: 13px;
        line-height: 1.5;
      }

      #quoteAuthor {
        display: block;
        margin-top: 10px;
        font-size: 11px;
        opacity: 0.6;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      #settingsPanel h3 {
        margin: 0 0 14px;
        font-size: 16px;
      }

      .settings-section {
        margin-bottom: 16px;
      }

      .settings-label {
        display: block;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        opacity: 0.7;
        margin-bottom: 8px;
      }

      .settings-select,
      .settings-color {
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 12px;
        padding: 10px;
        background: rgba(255, 255, 255, 0.08);
        color: #ffffff;
      }

      .color-row {
        display: flex;
        gap: 8px;
        margin-top: 8px;
      }

      .settings-color {
        width: 28px;
        height: 28px;
        padding: 0;
        border-radius: 10px;
        cursor: pointer;
      }

      #dock {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: end;
        gap: 12px;
        padding: 10px 14px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.08));
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 26px;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(24px) saturate(180%);
        z-index: 1001;
      }

      #settingsButton {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.08));
      }

      .dock-icon {
        width: 64px;
        height: 64px;
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.18);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        cursor: pointer;
        user-select: none;
      }

      .dock-icon:hover,
      .dock-icon:focus-visible {
        transform: translateY(-14px) scale(1.16);
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.24);
      }

      .dock-icon svg {
        width: 44px;
        height: 44px;
        display: block;
      }

      .finder {
        background: linear-gradient(180deg, #f8d17f, #f59e0b);
      }

      .safari {
        background: linear-gradient(180deg, #7dd3fc, #0ea5e9);
      }

      .mail {
        background: linear-gradient(180deg, #fca5a5, #ef4444);
      }

      .music {
        background: linear-gradient(180deg, #c4b5fd, #8b5cf6);
      }

      .notes {
        background: linear-gradient(180deg, #86efac, #22c55e);
      }
    </style>
  </head>
  <body>
    <div id="topbar" style="position: fixed; top: 0; left: 0; right: 0; height: 48px; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; background: rgba(22, 22, 26, 0.55); border-bottom: 2px solid var(--accent); backdrop-filter: blur(14px); box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset; z-index: 1000;">
      <div style="display: flex; align-items: center; gap: 10px; width: 140px;">
        <span style="font-size: 12px; font-weight: 700; letter-spacing: 0.04em; color: #ffffff;">Activities</span>
      </div>
      <div style="display: flex; align-items: center; justify-content: center; flex: 1;">
        <span id="timeElement" style="font-size: 12px; font-weight: 600; color: #ffffff;">--:--</span>
      </div>
      <div style="display: flex; align-items: center; gap: 10px; width: 140px; justify-content: flex-end;">
        <div style="width: 12px; height: 12px; border-radius: 999px; background: #4ade80;"></div>
      </div>
    </div>

    <div id="settingsPanel" aria-label="Settings panel">
      <h3>Settings</h3>
      <div class="settings-section">
        <label class="settings-label" for="wallpaperSelect">Wallpaper</label>
        <select id="wallpaperSelect" class="settings-select">
          <option value="./kermitwallpaper.png">Kermit</option>
          <option value="linear-gradient(135deg, #1b4332, #2d6a4f 42%, #52b788 82%)">Kermit Green</option>
          <option value="linear-gradient(135deg, #0b1120, #14532d 38%, #34d399 100%)">Kermit Forest</option>
          <option value="linear-gradient(135deg, #164e63, #06b6d4 40%, #a7f3d0 100%)">Kermit Aqua</option>
          <option value="linear-gradient(135deg, #3f6212, #84cc16 35%, #bef264 100%)">Kermit Glow</option>
        </select>
      </div>
      <div class="settings-section">
        <label class="settings-label" for="widgetToggle">Widgets</label>
        <select id="widgetToggle" class="settings-select">
          <option value="show">Show widgets</option>
          <option value="hide">Hide widgets</option>
        </select>
      </div>
      <div class="settings-section">
        <label class="settings-label">Accent color</label>
        <div class="color-row">
          <button class="settings-color" data-accent="#2e8b57" style="background:#2e8b57"></button>
          <button class="settings-color" data-accent="#60a5fa" style="background:#60a5fa"></button>
          <button class="settings-color" data-accent="#f59e0b" style="background:#f59e0b"></button>
          <button class="settings-color" data-accent="#ec4899" style="background:#ec4899"></button>
          <button class="settings-color" data-accent="#8b5cf6" style="background:#8b5cf6"></button>
        </div>
      </div>
    </div>

    <div id="widgetsPanel" aria-label="Desktop widgets">
      <div id="clockWidget" class="widget-card">
        <span id="dateDisplay"></span>
        <span id="clockDisplay"></span>
      </div>
      <div id="calendarWidget" class="widget-card">
        <div id="calendarHeader"><span id="calendarMonth"></span><span id="calendarYear"></span></div>
        <div id="calendarGrid" aria-label="Calendar"></div>
      </div>
      <div id="quoteWidget" class="widget-card">
        <div id="quoteText"></div>
        <span id="quoteAuthor"></span>
      </div>
    </div>
    <div id="welcome" style="position: absolute; border: 2px solid #2e8b57; width: 200px; border-radius: 16px; padding: 16px; background: white; top: 120px; left: 100px; box-shadow: 0 8px 30px rgba(0,0,0,0.25);">
      <div id="welcomeheader" style="display: flex; justify-content: space-between; align-items: center; user-select: none; cursor: grab; margin-bottom: 8px;">
        <div style="display: flex; align-items: center; gap: 8px;">
          <div id="welcomeclose" style="width: 14px; height: 14px; background: #ff5f57; border-radius: 999px; cursor: pointer;"></div>
          <div id="welcomeminimize" style="width: 14px; height: 14px; background: #fdbc40; border-radius: 999px;"></div>
          <div id="welcomemaximize" style="width: 14px; height: 14px; background: #32d74b; border-radius: 999px;"></div>
        </div>
        <span style="font-weight: 700;">Polo OS</span>
      </div>
      <h1 style="margin: 4px;">Welcome to Polo OS</h1>
      <h2>Introduction</h2>
      <p style="color: #2e8b57">This OS is called Polo OS and is a kermit the frog based operating system. I hope you enjoy it!</p>
      <div style="display: flex; flex-direction: column; align-items: center;">
        <img style="width: 64px; height: 64px; border-radius: 16px; object-fit: cover" src="./nameOfImage.jpg" />
        <a href="https://www.youtube.com/watch?v=O8n-BF5lrnQ" style="margin-top: 8px;">Check this out!</a>
      </div>
    </div>

    <div id="dock" aria-label="Application dock">
      <div id="settingsButton" class="dock-icon" title="Settings" aria-label="Open settings">
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3.2"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.2a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.2a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.2a1.65 1.65 0 0 0 1 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.2a1.65 1.65 0 0 0-1.51 1Z"/>
        </svg>
      </div>
      <div class="dock-icon finder" title="Finder">
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 7a2 2 0 0 1 2-2h3l2 2h5a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z"/>
          <path d="M4 11h16"/>
        </svg>
      </div>
      <div class="dock-icon safari" title="Safari">
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/>
          <path d="M12 3a9 9 0 0 1 0 18"/>
          <path d="M3 12h18"/>
          <path d="M5.6 5.6 18.4 18.4"/>
          <path d="M18.4 5.6 5.6 18.4"/>
        </svg>
      </div>
      <div class="dock-icon mail" title="Mail">
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="5" width="18" height="14" rx="2"/>
          <path d="m4 7 8 7 8-7"/>
        </svg>
      </div>
      <div class="dock-icon music" title="Music">
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18V6l10-2v12"/>
          <circle cx="6" cy="18" r="3"/>
          <circle cx="16" cy="16" r="3"/>
        </svg>
      </div>
      <div class="dock-icon notes" title="Notes">
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 4h8a2 2 0 0 1 2 2v12l-4-3H8a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z"/>
          <path d="M10 9h6"/>
          <path d="M10 12h4"/>
        </svg>
      </div>
    </div>
    <script src="./script.js"></script>
  </body>

</html>
